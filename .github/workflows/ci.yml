name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop
  push:
    branches:
      - main
      - master
      - develop

jobs:
  changeset-policy:
    name: Changeset policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate changeset policy
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          mapfile -t CHANGESET_FILES < <(find .changeset -maxdepth 1 -type f -name "*.md" ! -name "README.md" | sort)
          CHANGESET_COUNT="${#CHANGESET_FILES[@]}"

          echo "Base branch: ${BASE_REF}"
          echo "Head branch: ${HEAD_REF}"
          echo "Pending changesets: ${CHANGESET_COUNT}"

          if [[ "${BASE_REF}" == "develop" && "${HEAD_REF}" == "main" ]]; then
            echo "Skipping changeset policy for main -> develop merge."
            exit 0
          fi

          if [[ "${BASE_REF}" == "develop" ]]; then
            if [[ "${CHANGESET_COUNT}" -eq 0 ]]; then
              echo "PRs into develop must include at least one pending changeset file in .changeset/*.md."
              exit 1
            fi

            echo "Develop policy passed: pending changesets found."
            exit 0
          fi

          if [[ "${BASE_REF}" == "main" ]]; then
            if [[ "${CHANGESET_COUNT}" -gt 0 ]]; then
              echo "PRs into main must not include pending changesets in .changeset/*.md."
              exit 1
            fi

            echo "Main policy passed: no pending changesets."
            exit 0
          fi

          echo "No changeset policy applies to base branch ${BASE_REF}."

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm run build
